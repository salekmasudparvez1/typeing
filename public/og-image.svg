<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816" />
      <stop offset="0.55" stop-color="#0d1021" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 120) rotate(35) scale(340 240)">
      <stop stop-color="#22d3ee" stop-opacity="0.45" />
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 110) rotate(-30) scale(360 260)">
      <stop stop-color="#a78bfa" stop-opacity="0.46" />
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="headline" x1="110" y1="140" x2="1100" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" />
      <stop offset="0.45" stop-color="#cffafe" />
      <stop offset="1" stop-color="#c4b5fd" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glowA)" />
  <rect width="1200" height="630" fill="url(#glowB)" />
  <rect x="72" y="64" width="1056" height="502" rx="32" fill="#08101f" fill-opacity="0.72" stroke="rgba(255,255,255,0.1)" />
  <text x="120" y="140" fill="#22d3ee" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="5">TYPEFLOW</text>
